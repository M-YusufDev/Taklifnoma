<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To'yga Taklifnoma</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #faf7f2;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-image: radial-gradient(circle at 10% 20%, rgba(245, 231, 220, 0.4) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(235, 210, 190, 0.3) 0%, transparent 50%);
        }

        /* ===== CARD ===== */
        .invitation {
            max-width: 620px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            padding: 48px 36px 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.08), 0 10px 30px rgba(0, 0, 0, 0.04);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .invitation:hover {
            transform: translateY(-4px);
        }

        /* decorative border */
        .invitation::before {
            content: '';
            position: absolute;
            inset: 12px;
            border: 1px solid rgba(180, 140, 110, 0.20);
            border-radius: 24px;
            pointer-events: none;
        }

        /* corner flourish */
        .invitation::after {
            content: '✦';
            position: absolute;
            top: 28px;
            right: 36px;
            font-size: 18px;
            color: #c9ad93;
            letter-spacing: 8px;
            opacity: 0.5;
        }

        /* ===== ORNAMENT ===== */
        .ornament {
            text-align: center;
            font-size: 20px;
            color: #d4b8a0;
            letter-spacing: 6px;
            margin-bottom: 14px;
            font-weight: 300;
        }

        .ornament--bottom {
            margin-top: 20px;
            margin-bottom: 0;
        }

        /* ===== GREETING ===== */
        .greeting {
            text-align: center;
            font-family: 'Great Vibes', cursive;
            font-size: 34px;
            color: #5a3e2e;
            margin-bottom: 10px;
            font-weight: 400;
            line-height: 1.2;
        }

        /* ===== DIVIDER ===== */
        .divider {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin: 12px 0 16px;
        }

        .divider__line {
            flex: 1;
            max-width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #dcc9bb, transparent);
        }

        .divider__icon {
            color: #c9ad93;
            font-size: 18px;
        }

        /* ===== BODY TEXT ===== */
        .body-text {
            text-align: center;
            color: #5e4a3c;
            font-size: 16px;
            line-height: 1.9;
            font-weight: 400;
            max-width: 480px;
            margin: 0 auto;
        }

        .body-text strong {
            color: #3d2b1f;
            font-weight: 600;
        }

        .body-text .family {
            display: block;
            margin-top: 12px;
            font-family: 'Great Vibes', cursive;
            font-size: 28px;
            color: #4d3425;
            font-weight: 400;
            letter-spacing: 1px;
        }

        /* ===== DETAILS (date + times) ===== */
        .details {
            margin: 28px 0 10px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .detail-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: #f8f3ee;
            padding: 12px 20px;
            border-radius: 100px;
            font-size: 15px;
            color: #4d3425;
            font-weight: 500;
            transition: background 0.2s;
        }

        .detail-item:hover {
            background: #f2e8e0;
        }

        .detail-item .emoji {
            font-size: 20px;
            line-height: 1;
        }

        .detail-item .label {
            font-weight: 400;
            color: #8b6b56;
            margin-right: 2px;
        }

        .detail-item .value {
            font-weight: 600;
            color: #3d2b1f;
        }

        /* ===== FOOTER ===== */
        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 12px;
            color: #b8a494;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 400;
        }

        .footer .heart {
            color: #d4a08a;
            font-size: 14px;
            display: inline-block;
            animation: pulse 1.8s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .invitation {
                padding: 32px 20px 28px;
                border-radius: 24px;
            }

            .invitation::before {
                inset: 8px;
                border-radius: 18px;
            }

            .invitation::after {
                top: 20px;
                right: 24px;
                font-size: 14px;
            }

            .greeting {
                font-size: 28px;
            }

            .body-text {
                font-size: 14px;
                line-height: 1.7;
            }

            .body-text .family {
                font-size: 24px;
            }

            .detail-item {
                font-size: 13px;
                padding: 10px 16px;
                flex-wrap: wrap;
                gap: 6px;
                border-radius: 40px;
            }

            .ornament {
                font-size: 16px;
                letter-spacing: 4px;
            }
        }

        @media (max-width: 380px) {
            .invitation {
                padding: 24px 14px 20px;
            }

            .greeting {
                font-size: 22px;
            }

            .body-text .family {
                font-size: 20px;
            }

            .detail-item {
                font-size: 12px;
                padding: 8px 12px;
            }
        }
    </style>
</head>
<body>

    <div class="invitation">

        <!-- top ornament -->
        <div class="ornament">✦ ✦ ✦</div>

        <!-- greeting -->
        <div class="greeting">Assalamu Aleykum<br />Hurmatli mehmon</div>

        <!-- divider -->
        <div class="divider">
            <span class="divider__line"></span>
            <span class="divider__icon">✦</span>
            <span class="divider__line"></span>
        </div>

        <!-- main text -->
        <div class="body-text">
            Sizni farzandlarimizning nikoh toyi hamda nabiralarimizning
            sunnat toylariga taklif qilamiz.
            <span class="family">Saidov Xolmurod hoji ota oilasi</span>
        </div>

        <!-- details: date + times -->
        <div class="details">
            <!-- DATE -->
            <div class="detail-item">
                <span class="emoji">📅</span>
                <span><span class="label">Sana:</span> <span class="value">25-iyul</span></span>
            </div>

            <!-- TIME 1 -->
            <div class="detail-item">
                <span class="emoji">🍚</span>
                <span><span class="label">Nahorgi osh:</span> <span class="value">soat 7:00</span></span>
            </div>

            <!-- TIME 2 -->
            <div class="detail-item">
                <span class="emoji">🌙</span>
                <span><span class="label">To'y oqshomi:</span> <span class="value">soat 19:00</span></span>
            </div>
        </div>

        <!-- bottom ornament -->
        <div class="ornament ornament--bottom">✦ ✦ ✦</div>

        <!-- footer -->
        <div class="footer">
            <span class="heart">♥</span> &nbsp;Sizni kutamiz!&nbsp; <span class="heart">♥</span>
        </div>

    </div>

</body>
</html>
